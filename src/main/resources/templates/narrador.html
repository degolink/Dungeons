<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pantalla del Narrador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/narrador.css">
</head>
<body>

<h1>Pantalla del Narrador</h1>

<div class="row">
    <div class="col-md-6" th:each="personaje : ${personajes}">
        <div class="card">
            <div class="card-header">
                <span th:text="${personaje.nombre}">Nombre</span>
                (Nivel <span th:text="${personaje.nivel}">4</span> 
                <span th:text="${personaje.clase}">Mago</span>)
            </div>
            <div class="card-body">
                <p>HP: <span class="stat" th:text="${personaje.puntosVida}">30</span>/<span th:text="${personaje.puntosVidaMax}">40</span></p>

                <p>
                    Monedas: 
                    <span th:text="${personaje.monedero.cobre}">10</span> C, 
                    <span th:text="${personaje.monedero.plata}">5</span> P, 
                    <span th:text="${personaje.monedero.oro}">20</span> O, 
                    <span th:text="${personaje.monedero.platino}">0</span> Platino
                </p>

                <p>Estados Alterados:</p>
                <ul>
                    <li th:each="condicion : ${personaje.condiciones}" th:text="${condicion.nombre}">Aturdido</li>
                </ul>

                <p>Inventario:</p>
                <div th:each="item : ${personaje.inventario}" class="inventory-item">
                    <span th:text="${item.itemBase.nombre}">Espada Larga</span>
                    <span>x<span th:text="${item.cantidad}">1</span></span>
                    <span th:text="${item.equipado ? 'Equipado' : ''}"></span>
                    <button class="btn btn-sm btn-success" th:onclick="'usarItem(' + ${item.id} + ')'">Usar</button>
                    <button class="btn btn-sm btn-primary" th:onclick="'equiparItem(' + ${item.id} + ')'">Equipar</button>
                    <button class="btn btn-sm btn-warning" th:onclick="'desequiparItem(' + ${item.id} + ')'">Desequipar</button>
                </div>

                <p>Hechizos:</p>
                <div th:each="hechizo : ${personaje.hechizos}" class="hechizo">
                    <span th:text="${hechizo.nombre}">Misil Mágico</span> 
                    (Nivel <span th:text="${hechizo.nivel}">1</span>) - <span th:text="${hechizo.clase}">Mago</span>
                    <br>
                    <small th:text="${hechizo.descripcion}">Un proyectil mágico que causa daño.</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function usarItem(id) {
        fetch('/api/iteminventario/usar/' + id, { method: 'POST' }).then(() => location.reload());
    }
    function equiparItem(id) {
        fetch('/api/iteminventario/equipar/' + id, { method: 'POST' }).then(() => location.reload());
    }
    function desequiparItem(id) {
        fetch('/api/iteminventario/desequipar/' + id, { method: 'POST' }).then(() => location.reload());
    }
</script>

</body>
</html>
