<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <img th:fragment="heroPortrait(imagePath, altText, extraClasses)"
         th:src="${imagePath != null and !#strings.isEmpty(imagePath) ? imagePath : '/img/batalla.gif'}"
         th:alt="${altText}"
         class="block max-w-full mx-auto rounded-none border-0 shadow-none bg-transparent object-cover object-center"
         th:classappend="${extraClasses}" />
</body>
</html>
