<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
    <img th:fragment="heroPortrait(imagePath, altText, extraClasses)"
         th:src="${imagePath != null and !#strings.isEmpty(imagePath) ? imagePath : '/img/batalla.gif'}"
         th:alt="${altText}"
         class="block mx-auto object-contain object-center rounded-2xl border bg-transparent drop-shadow-lg"
         th:classappend="${extraClasses}" />
</body>
</html>
